<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="rgba(0,0,0,0.15)"/>
  <!-- Logo circle -->
  <circle cx="600" cy="220" r="80" fill="white" opacity="0.15"/>
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <!-- Main title -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">Amohamobiles</text>
  <!-- Subtitle -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)" text-anchor="middle">Best Mobile Shop in Idikarai, Coimbatore</text>
  <!-- Tags -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)" text-anchor="middle">Smartphones • Accessories • Repairs • Tamil Nadu</text>
  <!-- URL -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)" text-anchor="middle">www.amohamobiles.com</text>
</svg>
